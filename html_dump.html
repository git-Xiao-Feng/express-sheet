<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>面单生成器 · Waybill Studio</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='20' font-size='20'>📦</text></svg>">
</head>
<body>
  <!-- ===================== 顶部条 ===================== -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
      </span>
      <div class="brand-text">
        <span class="brand-title">面单生成器</span>
        <span class="brand-sub">Waybill Studio · 纯本地</span>
      </div>
    </div>

    <div class="page-size" role="group" aria-label="纸张尺寸">
      <span class="ps-label">纸张</span>
      <div class="num-input">
        <input id="pageW" type="number" min="1" max="500" step="1" value="100" aria-label="宽度(mm)">
        <span class="num-unit">mm</span>
      </div>
      <span class="ps-x">×</span>
      <div class="num-input">
        <input id="pageH" type="number" min="1" max="500" step="1" value="150" aria-label="高度(mm)">
        <span class="num-unit">mm</span>
      </div>
    </div>

    <div class="actions">
      <button id="btnReset" class="btn btn-ghost" type="button" title="恢复默认模板并清空字段值">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        <span>重置</span>
      </button>
      <button id="btnExport" class="btn btn-primary" type="button" title="生成并下载 PDF">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>导出 PDF</span>
      </button>
    </div>
  </header>

  <!-- ===================== 主体 ===================== -->
  <main class="main">
    <!-- 左栏:字段 -->
    <section class="panel" id="panel-fields">
      <header class="panel-header">
        <div class="panel-title">
          <h2>字段</h2>
          <span class="panel-count" id="fieldCount">0</span>
        </div>
        <button id="btnAddField" class="btn btn-soft" type="button">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>添加字段</span>
        </button>
      </header>
      <div class="panel-toolbar">
        <div class="search-input">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="fieldSearch" type="text" placeholder="搜索字段名或 key...">
        </div>
      </div>
      <div id="fieldsList" class="panel-body field-list"></div>
    </section>

    <!-- 中栏:区块 -->
    <section class="panel" id="panel-blocks">
      <header class="panel-header">
        <div class="panel-title">
          <h2>区块</h2>
          <span class="panel-count" id="blockCount">0</span>
        </div>
        <button id="btnAddBlock" class="btn btn-soft" type="button">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>添加区块</span>
        </button>
      </header>
      <div id="blocksList" class="panel-body block-list"></div>
    </section>

    <!-- 右栏:预览 -->
    <section class="panel" id="panel-preview">
      <header class="panel-header">
        <div class="panel-title">
          <h2>预览</h2>
          <span id="previewMeta" class="panel-meta">100 × 150 mm</span>
        </div>
        <div class="preview-toolbar">
          <button id="btnZoomOut" class="icon-btn" title="缩小" type="button">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <span id="zoomLabel" class="zoom-label">100%</span>
          <button id="btnZoomIn" class="icon-btn" title="放大" type="button">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <button id="btnZoomFit" class="icon-btn" title="适应窗口" type="button">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
          <span class="toolbar-divider"></span>
          <button id="btnToggleGrid" class="icon-btn toggle" title="显示/隐藏网格" type="button" aria-pressed="false">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </button>
        </div>
      </header>
      <div class="panel-body preview-body">
        <div class="preview-stage" id="previewStage">
          <canvas id="canvas" width="378" height="567"></canvas>
        </div>
      </div>
    </section>
  </main>

  <!-- ===================== 底部状态条 ===================== -->
  <footer class="statusbar">
    <div class="status-left">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">已就绪</span>
    </div>
    <div class="status-right">
      <span class="status-item" id="statusFields">字段 0</span>
      <span class="status-divider"></span>
      <span class="status-item" id="statusBlocks">区块 0</span>
      <span class="status-divider"></span>
      <span class="status-item" id="statusPreview">最近渲染 —</span>
      <span class="status-divider"></span>
      <span class="status-item">无持久化 · 刷新即清空</span>
    </div>
  </footer>

  <!-- ===================== 模态:添加字段 ===================== -->
  <div class="modal" id="modal-add-field" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-add-field-title">
      <header class="modal-header">
        <h3 id="modal-add-field-title">添加自定义字段</h3>
        <button class="icon-btn" data-close type="button" aria-label="关闭">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </header>
      <div class="modal-body">
        <div class="form-group">
          <label for="newFieldKey">字段 key <span class="hint">英文/数字/下划线,不可与已有重复</span></label>
          <input id="newFieldKey" type="text" placeholder="例如:tracking_no" autocomplete="off" spellcheck="false">
        </div>
        <div class="form-group">
          <label for="newFieldLabel">显示名 <span class="hint">中文,任意字符</span></label>
          <input id="newFieldLabel" type="text" placeholder="例如:运单号" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="newFieldDefault">默认值 <span class="hint">可选</span></label>
          <input id="newFieldDefault" type="text" placeholder="可输入任意字符,含中文/换行/特殊字符" autocomplete="off">
        </div>
      </div>
      <footer class="modal-footer">
        <button class="btn btn-ghost" data-close type="button">取消</button>
        <button id="btnConfirmAddField" class="btn btn-primary" type="button">添加</button>
      </footer>
    </div>
  </div>

  <!-- ===================== 模态:通用确认 ===================== -->
  <div class="modal" id="modal-confirm" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-dialog modal-sm" role="alertdialog" aria-modal="true" aria-labelledby="modal-confirm-title">
      <header class="modal-header">
        <h3 id="modal-confirm-title">确认</h3>
      </header>
      <div class="modal-body">
        <p id="modal-confirm-msg" class="confirm-msg">是否继续?</p>
      </div>
      <footer class="modal-footer">
        <button id="btnConfirmCancel" class="btn btn-ghost" type="button">取消</button>
        <button id="btnConfirmOk" class="btn btn-primary" type="button">确认</button>
      </footer>
    </div>
  </div>

  <!-- ===================== 提示条 ===================== -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="/static/app.js"></script>
</body>
</html>
